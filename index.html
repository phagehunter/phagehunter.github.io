<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CURTIS HOFFMANN</title>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200;0,400;1,200&family=Inter:wght@300&display=swap" rel="stylesheet">
  <style>
    :root {
      --midnight: #000b18;
      --indigo: #1a2a44;
      --gold: #c5a059;
      --bone: #e2e8f0;
      --slate: #4a5568;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Crimson Pro', serif;
      background-color: var(--midnight);
      /* Indigo Radial Gradient */
      background: radial-gradient(circle at center, var(--indigo) 0%, var(--midnight) 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: var(--bone);
    }

    /* Diagonal Texture Lines */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0.04;
      pointer-events: none;
      background-image: repeating-linear-gradient(45deg, #fff 0px, #fff 1px, transparent 1px, transparent 3px);
    }

    .container { text-align: center; position: relative; z-index: 10; width: 100%; }

    header {
      margin-bottom: 2.5rem;
      /* Cinematic Intro Animation */
      animation: blurFadeIn 3.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .prefix {
      font-size: 0.65rem;
      letter-spacing: 0.8em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      font-weight: 300;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 200;
      letter-spacing: 0.3em;
      color: var(--bone);
      text-transform: uppercase;
    }

    .tagline {
      font-size: 0.85rem;
      font-style: italic;
      letter-spacing: 0.2em;
      color: var(--slate);
      margin-top: 0.8rem;
    }

    .canvas-container {
      position: relative;
      width: 100vw;
      height: 500px;
      margin: 0 auto;
      cursor: crosshair;
    }

    canvas { display: block; filter: drop-shadow(0 0 20px rgba(197, 160, 89, 0.15)); }

    /* Blur/Fade Intro */
    @keyframes blurFadeIn {
      0% {
        opacity: 0;
        filter: blur(15px);
        transform: translateY(15px);
        letter-spacing: 1.5em;
      }
      100% {
        opacity: 1;
        filter: blur(0px);
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="prefix">Tikkun Mada // Anthropology</div>
      <h1>CURTIS HOFFMANN</h1>
      <div class="tagline">weaving biological and cultural lineages</div>
    </header>
    <div class="canvas-container">
      <canvas id="kineticLoom"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('kineticLoom');
    const ctx = canvas.getContext('2d');
    let t = 0, lastTs = 0, mouseX = -1, mouseY = -1, pointerInside = false;
    let bloom = 0;
    
    let nodes = [];
    const nodeLinks = Array.from({length: 8}, (_, i) => `https://scholar.google.com/citations?user=EOEi56EAAAAJ&hl=en`);

    function sizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = canvas.parentElement.clientWidth * dpr;
      canvas.height = canvas.parentElement.clientHeight * dpr;
      canvas.style.width = canvas.parentElement.clientWidth + 'px';
      canvas.style.height = canvas.parentElement.clientHeight + 'px';
      ctx.scale(dpr, dpr);
    }
    window.addEventListener('resize', sizeCanvas);
    sizeCanvas();

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
      pointerInside = true;
    });
    canvas.addEventListener('mouseleave', () => { pointerInside = false; canvas.style.cursor = 'default'; });
    
    canvas.addEventListener('click', () => {
      if (bloom > 0.6) {
        nodes.forEach(n => {
          const dx = mouseX - n.x, dy = mouseY - n.y;
          if (Math.sqrt(dx*dx + dy*dy) < n.r) window.open(n.link, '_blank');
        });
      }
    });

    function drawVesicaIcon(x, y, size, active) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(t * 0.15);
      ctx.lineWidth = 0.8;
      ctx.strokeStyle = `rgba(197, 160, 89, ${active * 0.6})`;
      const count = 6;
      for (let i = 0; i < count; i++) {
        ctx.rotate((Math.PI * 2) / count);
        ctx.beginPath();
        ctx.arc(size / 2.5, 0, size / 1.8, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.fillStyle = `rgba(226, 232, 240, ${active})`;
      ctx.beginPath();
      ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function loop(ts) {
      const dt = (ts - lastTs) / 1000 || 0;
      lastTs = ts;
      t += dt * 0.4;
      const w = canvas.clientWidth, h = canvas.clientHeight;
      const centerX = w / 2, centerY = h / 2;
      ctx.clearRect(0, 0, w, h);

      bloom += ((pointerInside ? 1 : 0) - bloom) * 0.04;
      const pulse = (Math.sin(t * 3) + 1) / 2;

      // 1. CONCENTRIC SEISMIC CIRCLES (GOLD)
      if (bloom > 0.02) {
        for (let r = 0; r < 7; r++) {
          const radius = (55 * r + (t * 45) % 55) * bloom;
          const alpha = Math.max(0, (1 - radius / (w * 0.4))) * bloom * (0.12 + pulse * 0.06);
          ctx.beginPath();
          ctx.strokeStyle = `rgba(197, 160, 89, ${alpha})`;
          ctx.lineWidth = 0.6 + (pulse * 1.2);
          ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      // 2. DNA WOVEN ROPE (12 STRANDS)
      const threadCount = 12;
      const points = 180;
      for (let s = 0; s < threadCount; s++) {
        ctx.beginPath();
        const offset = (s / threadCount) * Math.PI * 2;
        ctx.strokeStyle = `rgba(197, 160, 89, ${0.3 * (1 - bloom)})`;
        ctx.lineWidth = 0.7;
        for (let i = 0; i <= points; i++) {
          const x = (i / points) * w;
          const xFactor = x * 0.01;
          const y1 = Math.sin(xFactor + t + offset) * 48;
          const y2 = Math.cos(xFactor * 0.5 - t * 0.5 + offset) * 15;
          const distToCenter = Math.abs(x - centerX);
          const disruptionAmps = Math.max(0, (250 - distToCenter));
          const richterJitter = Math.sin((x * 0.5) + (t * 12)) * (pulse * 14 * bloom * (disruptionAmps / 250));
          const y = centerY + (y1 + y2) * (1 - bloom) + richterJitter;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      // 3. OVERLAPPING CIRCLE ICONS (4x2 GRID)
      nodes = [];
      let isHovering = false;
      if (bloom > 0.01) {
        const rows = 2, cols = 4;
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const x = (w / (cols + 1)) * (c + 1);
            const y = centerY + (r === 0 ? -130 : 130) * bloom + Math.sin(t*0.7 + c)*6;
            const size = 38 * bloom;
            drawVesicaIcon(x, y, size, bloom);
            nodes.push({ x, y, r: size * 1.3, link: nodeLinks[r*4 + c] });
            if (pointerInside && Math.sqrt((mouseX-x)**2 + (mouseY-y)**2) < size * 1.3) isHovering = true;
          }
        }
      }

      canvas.style.cursor = isHovering ? 'pointer' : 'default';

      // ROMAN MAXIMUM ETHOS LABEL
      ctx.font = "400 9px 'Crimson Pro'";
      ctx.textAlign = "center";
      ctx.letterSpacing = "0.9em";
      ctx.fillStyle = `rgba(226, 232, 240, ${0.1 + bloom * 0.5})`;
      ctx.fillText(bloom > 0.8 ? "SYSTEMA STABILITUM // ARCHIVUM" : "OBSERVARE ET COLLIGERE", w/2, 40);

      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
