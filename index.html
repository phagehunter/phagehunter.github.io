<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curtis Hoffmann | The Biosemiotic Loom</title>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@200;400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --gold: #c5a059;
      --slate: #4a5568;
      --bone: #e2e8f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: var(--bone);
    }

    /* Fine-grain texture for a "museum" feel */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
    }

    .container { text-align: center; position: relative; z-index: 10; width: 100%; }

    header {
      margin-bottom: 2rem;
      animation: fadeIn 3s ease-in-out;
    }

    .prefix {
      font-family: 'Crimson Pro', serif;
      font-size: 0.7rem;
      letter-spacing: 0.8em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Crimson Pro', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 200;
      letter-spacing: 0.1em;
      color: var(--bone);
      text-transform: uppercase;
    }

    .tagline {
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.4em;
      color: var(--slate);
      margin-top: 0.5rem;
    }

    .canvas-container {
      position: relative;
      width: 100vw;
      height: 550px;
      margin: 0 auto;
      cursor: crosshair;
    }

    canvas { display: block; filter: drop-shadow(0 0 20px rgba(197, 160, 89, 0.1)); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="prefix">Anthropological Systems</div>
      <h1>Curtis Hoffmann</h1>
      <div class="tagline">Genomic Weaver • PhD Candidate</div>
    </header>
    <div class="canvas-container">
      <canvas id="kineticCanvas"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('kineticCanvas');
    const ctx = canvas.getContext('2d');
    let t = 0, lastTs = 0, mouseX = -1, mouseY = -1, pointerInside = false;
    let bloom = 0;
    
    let nodes = [];
    const nodeLinks = Array.from({length: 8}, (_, i) => `https://scholar.google.com/citations?user=curtis${i}`);

    function sizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = canvas.parentElement.clientWidth * dpr;
      canvas.height = canvas.parentElement.clientHeight * dpr;
      canvas.style.width = canvas.parentElement.clientWidth + 'px';
      canvas.style.height = canvas.parentElement.clientHeight + 'px';
      ctx.scale(dpr, dpr);
    }
    window.addEventListener('resize', sizeCanvas);
    sizeCanvas();

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
      pointerInside = true;
    });
    canvas.addEventListener('mouseleave', () => { pointerInside = false; canvas.style.cursor = 'default'; });
    
    canvas.addEventListener('click', () => {
      if (bloom > 0.6) {
        nodes.forEach(n => {
          const dx = mouseX - n.x, dy = mouseY - n.y;
          if (Math.sqrt(dx*dx + dy*dy) < n.r) window.open(n.link, '_blank');
        });
      }
    });

    function drawSacredGeometry(x, y, size, active) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(t * 0.2);
      
      const petals = 8;
      ctx.lineWidth = 0.8;
      
      // The "Brahman" Flower
      for (let i = 0; i < petals; i++) {
        ctx.rotate((Math.PI * 2) / petals);
        ctx.strokeStyle = `rgba(197, 160, 89, ${active})`;
        
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(size/2, -size/2, size, -size/4, size, 0);
        ctx.bezierCurveTo(size, size/4, size/2, size/2, 0, 0);
        ctx.stroke();
        
        // Internal geometry
        ctx.beginPath();
        ctx.arc(size/2, 0, size/4, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(74, 85, 104, ${active * 0.5})`;
        ctx.stroke();
      }
      
      // Core
      ctx.fillStyle = `rgba(226, 232, 240, ${active})`;
      ctx.beginPath();
      ctx.arc(0, 0, 2, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
    }

    function loop(ts) {
      const dt = (ts - lastTs) / 1000 || 0;
      lastTs = ts;
      t += dt * 0.3; // Meditative rotation speed
      const w = canvas.clientWidth, h = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);

      const centerY = h / 2;
      bloom += ((pointerInside ? 1 : 0) - bloom) * 0.04;

      // The "Infinite Silk" Braid
      const threadCount = 12;
      const points = 120;
      
      for (let s = 0; s < threadCount; s++) {
        ctx.beginPath();
        const offset = (s / threadCount) * Math.PI * 2;
        const colorShift = Math.sin(t + offset) * 20;
        ctx.strokeStyle = `rgba(${197+colorShift}, ${160+colorShift}, ${89+colorShift}, ${0.35 * (1 - bloom)})`;
        ctx.lineWidth = 0.6;

        for (let i = 0; i <= points; i++) {
          const x = (i / points) * w;
          // Mathematical "Helix-Torus" combination
          const xFactor = x * 0.008;
          const y1 = Math.sin(xFactor + t + offset) * 50;
          const y2 = Math.cos(xFactor * 0.5 - t + offset) * 20;
          
          const y = centerY + (y1 + y2) * (1 - bloom);
          
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      // Interactive Bloom Grid
      nodes = [];
      let isHovering = false;
      if (bloom > 0.01) {
        const cols = 4;
        for (let r = 0; r < 2; r++) {
          for (let c = 0; c < cols; c++) {
            const x = (w / (cols + 1)) * (c + 1);
            const y = centerY + (r === 0 ? -125 : 125) * bloom;
            const radius = 65 * bloom;
            
            drawSacredGeometry(x, y + Math.sin(t*2 + c)*10, 40 * bloom, bloom);
            nodes.push({ x, y, r: radius, link: nodeLinks[r*4 + c] });

            const dx = mouseX - x, dy = mouseY - y;
            if (pointerInside && Math.sqrt(dx*dx + dy*dy) < radius) isHovering = true;
            
            // Connection threads (The "Tension" of the loom)
            ctx.beginPath();
            ctx.strokeStyle = `rgba(197, 160, 89, ${bloom * 0.12})`;
            ctx.moveTo(x, y);
            ctx.lineTo(w/2, centerY);
            ctx.stroke();
          }
        }
      }

      canvas.style.cursor = isHovering ? 'pointer' : 'default';

      // Status Label
      ctx.font = "300 9px 'Inter'";
      ctx.textAlign = "center";
      ctx.letterSpacing = "0.8em";
      ctx.fillStyle = `rgba(197, 160, 89, ${0.1 + bloom * 0.6})`;
      ctx.fillText(bloom > 0.8 ? "SYSTEM CONFIGURATION: HARMONIC" : "CALIBRATING ANCESTRAL FREQUENCIES", w/2, 40);

      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
