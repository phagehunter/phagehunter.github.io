  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200;0,400;1,200&family=Inter:wght@300&display=swap" rel="stylesheet">
  <style>
    :root {
      --midnight: #000b18;
      --indigo: #1a2a44;
      --gold: #c5a059;
      --bone: #e2e8f0;
      --slate: #4a5568;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Crimson Pro', serif;
      background-color: var(--midnight);
      background: radial-gradient(circle at center, var(--indigo) 0%, var(--midnight) 100%);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      color: var(--bone);
      -webkit-font-smoothing: antialiased;
      padding: calc(1.5rem + var(--safe-top)) 1.25rem calc(1.25rem + var(--safe-bottom));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      opacity: 0.04;
      pointer-events: none;
      z-index: 1;
      background-image: repeating-linear-gradient(45deg, #fff 0px, #fff 1px, transparent 1px, transparent 3px);
    }

    header {
      position: relative;
      z-index: 20;
      text-align: center;
      flex-shrink: 0;
      padding: 0 0.5rem;
      animation: blurFadeIn 3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .prefix {
      font-size: clamp(0.55rem, 2.4vw, 0.65rem);
      letter-spacing: 0.7em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.1rem;
      font-weight: 300;
      padding-left: 0.7em;
      overflow-wrap: break-word;
    }

    h1 {
      font-size: clamp(1.9rem, 8vw, 3.2rem);
      font-weight: 200;
      letter-spacing: 0.28em;
      color: var(--bone);
      text-transform: uppercase;
      padding-left: 0.28em;
    }

    .tagline {
      font-size: clamp(0.8rem, 3.6vw, 0.9rem);
      font-style: italic;
      letter-spacing: 0.18em;
      color: #7c8aa0;
      margin-top: 0.8rem;
    }

    .canvas-container {
      position: relative;
      z-index: 10;
      flex: 1 1 auto;
      min-height: 0;
      width: 100vw;
      align-self: center;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px rgba(197, 160, 89, 0.15));
      touch-action: manipulation;
    }

    footer {
      position: relative;
      z-index: 20;
      flex-shrink: 0;
      text-align: center;
      margin-top: 0.5rem;
      animation: blurFadeIn 4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .cv-button {
      display: inline-block;
      padding: 0.9rem 2.6rem;
      border: 1px solid rgba(197, 160, 89, 0.3);
      border-radius: 2px;
      color: var(--gold);
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      transition: all 0.5s ease;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
    }

    .cv-button:hover,
    .cv-button:focus-visible {
      border-color: var(--gold);
      background: rgba(197, 160, 89, 0.05);
      letter-spacing: 0.5em;
      color: var(--bone);
      outline: none;
    }

    /* Sound toggle: fixed bottom-left on wide screens… */
    #audio-toggle {
      position: fixed;
      bottom: calc(16px + var(--safe-bottom));
      left: calc(16px + env(safe-area-inset-left, 0px));
      z-index: 100;
      background: rgba(0, 11, 24, 0.5);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(74, 85, 104, 0.35);
      border-radius: 2px;
      min-height: 40px;
      padding: 8px 14px;
      color: var(--slate);
      font-family: 'Crimson Pro', serif;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.4s ease, border-color 0.4s ease, opacity 0.4s ease;
      opacity: 0.75;
      -webkit-tap-highlight-color: transparent;
    }

    #audio-toggle:hover,
    #audio-toggle:focus-visible {
      color: var(--gold);
      border-color: var(--gold);
      opacity: 1;
      outline: none;
    }

    /* …and centered in the flow below Contact once the screen is narrow */
    @media (max-width: 620px) {
      #audio-toggle {
        position: static;
        bottom: auto;
        left: auto;
        margin: 0.9rem auto 0;
        align-self: center;
      }
    }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes blurFadeIn {
      0% { opacity: 0; filter: blur(14px); transform: translateY(14px); letter-spacing: 1.2em; }
      100% { opacity: 1; filter: blur(0); transform: translateY(0); }
    }
  </style>
</head>
<body>

  <audio id="bgMusic" loop preload="none">
    <source src="symphony.mp3" type="audio/mpeg">
  </audio>

  <header>
    <div class="prefix">Tikkun Mada • תִּיקּוּן עוֹלָם</div>
    <h1>Curtis Hoffmann</h1>
    <p class="tagline">weaving biological and cultural lineages</p>
  </header>

  <div class="canvas-container">
    <canvas id="kineticLoom" aria-hidden="true"></canvas>
  </div>

  <footer>
    <a href="mailto:ch1620@georgetown.edu" class="cv-button">Contact Me</a>
  </footer>

  <button id="audio-toggle" type="button" aria-pressed="false">Sound: Off</button>

  <!-- Accessible / crawlable mirror of the canvas navigation -->
  <nav class="sr-only" aria-label="Projects and profiles">
    <ul>
      <li><a href="https://phagehunter.github.io/exoplanetatlas/">Exoplanet Atlas</a></li>
      <li><a href="https://phagehunter.github.io/humanevolution/">Human Evolution</a></li>
      <li><a href="https://phagehunter.github.io/biodefense/">Biodefense Budget</a></li>
      <li><a href="https://phagehunter.github.io/rnaviromeatlas/">RNA Virome Atlas</a></li>
      <li><a href="https://phagehunter.github.io/odyssey/">Odyssey Atlas</a></li>
      <li><a href="https://phagehunter.github.io/catalogue_of_life/">Catalogue of Life</a></li>
      <li><a href="https://scholar.google.com/citations?user=EOEi56EAAAAJ&hl=en">Google Scholar</a></li>
      <li><a href="https://www.linkedin.com/in/phagehunter/">LinkedIn</a></li>
    </ul>
  </nav>

  <script>
    const canvas = document.getElementById('kineticLoom');
    const ctx = canvas.getContext('2d');
    const music = document.getElementById('bgMusic');
    const audioBtn = document.getElementById('audio-toggle');

    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const isTouch = window.matchMedia('(hover: none), (pointer: coarse)').matches
                    || ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

    let t = 0, lastTs = 0, mouseX = -9999, mouseY = -9999, pointerInside = false;
    let bloom = 0, bloomTarget = 0;
    let musicInitialized = false;

    audioBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!musicInitialized) {
        music.volume = 0;
        music.play().then(() => {
          musicInitialized = true;
          audioBtn.innerText = 'Sound: On';
          audioBtn.setAttribute('aria-pressed', 'true');
          const fade = setInterval(() => {
            if (music.volume < 0.4) music.volume = Math.min(0.4, music.volume + 0.02);
            else clearInterval(fade);
          }, 150);
        }).catch(() => {});
      } else if (music.paused) {
        music.play();
        audioBtn.innerText = 'Sound: On';
        audioBtn.setAttribute('aria-pressed', 'true');
      } else {
        music.pause();
        audioBtn.innerText = 'Sound: Off';
        audioBtn.setAttribute('aria-pressed', 'false');
      }
    });

    const nodeData = [
      { label: "Exoplanet Atlas", link: "https://phagehunter.github.io/exoplanetatlas/", hoverState: 0 },
      { label: "Human Evolution", link: "https://phagehunter.github.io/humanevolution/", hoverState: 0 },
      { label: "Biodefense Budget", link: "https://phagehunter.github.io/biodefense/", hoverState: 0 },
      { label: "RNA Virome Atlas", link: "https://phagehunter.github.io/rnaviromeatlas/", hoverState: 0 },
      { label: "Odyssey Atlas", link: "https://phagehunter.github.io/odyssey/", hoverState: 0 },
      { label: "Planet Tracker", link: "https://phagehunter.github.io/terramotus/", hoverState: 0 },
      { label: "Google Scholar", link: "https://scholar.google.com/citations?user=EOEi56EAAAAJ&hl=en", hoverState: 0 },
      { label: "LinkedIn", link: "https://www.linkedin.com/in/phagehunter/", hoverState: 0 }
    ];

    let currentNodes = [];

    function sizeCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const w = canvas.parentElement.clientWidth;
      const h = canvas.parentElement.clientHeight;
      canvas.width = Math.round(w * dpr);
      canvas.height = Math.round(h * dpr);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', sizeCanvas);
    window.addEventListener('orientationchange', sizeCanvas);

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
      pointerInside = true;
      if (!isTouch) bloomTarget = 1;
    });
    canvas.addEventListener('mouseleave', () => {
      pointerInside = false;
      mouseX = mouseY = -9999;
      if (!isTouch) bloomTarget = 0;
      canvas.style.cursor = 'default';
    });

    function openNodeAt(x, y) {
      let opened = false;
      currentNodes.forEach(n => {
        if (Math.hypot(x - n.x, y - n.y) < n.r * 1.35 && n.link) {
          window.open(n.link, '_blank', 'noopener');
          opened = true;
        }
      });
      return opened;
    }

    canvas.addEventListener('click', () => {
      if (!isTouch && bloom > 0.5) openNodeAt(mouseX, mouseY);
    });

    canvas.addEventListener('touchend', e => {
      const rect = canvas.getBoundingClientRect();
      const tp = e.changedTouches[0];
      const tx = tp.clientX - rect.left;
      const ty = tp.clientY - rect.top;
      if (bloom < 0.5) bloomTarget = 1;
      else if (!openNodeAt(tx, ty)) bloomTarget = 0;
      e.preventDefault();
    }, { passive: false });

    function drawVesicaIcon(x, y, size, active, hoverState) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(t * 0.15);
      const scaleBoost = 1 + (hoverState * 0.2);
      const finalOpacity = (active * 0.5) + (hoverState * 0.5);
      ctx.lineWidth = 0.8 + (hoverState * 0.6);
      ctx.strokeStyle = `rgba(197, 160, 89, ${finalOpacity})`;
      if (hoverState > 0.01) {
        ctx.shadowBlur = hoverState * 20;
        ctx.shadowColor = `rgba(197, 160, 89, ${hoverState * 0.8})`;
      }
      const count = 6;
      for (let i = 0; i < count; i++) {
        ctx.rotate((Math.PI * 2) / count);
        ctx.beginPath();
        ctx.arc((size * scaleBoost) / 2.5, 0, (size * scaleBoost) / 1.8, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.fillStyle = `rgba(226, 232, 240, ${active})`;
      ctx.beginPath();
      ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Draw the Latin motto, auto-shrinking so it always fits with side padding
    function drawMotto(text, y, w) {
      const maxW = w - 48;
      let fs = (w < 620) ? 8 : 9;
      ctx.textAlign = "center";
      ctx.font = `400 ${fs}px 'Crimson Pro'`;
      ctx.letterSpacing = (w < 620 ? 0.28 : 0.9) + "em";
      let tw = ctx.measureText(text).width;
      if (tw > maxW) {
        fs = Math.max(6, fs * (maxW / tw));
        ctx.font = `400 ${fs}px 'Crimson Pro'`;
      }
      ctx.fillStyle = `rgba(226, 232, 240, ${0.1 + bloom * 0.5})`;
      ctx.fillText(text, w / 2, y);
    }

    function loop(ts) {
      const dt = Math.min((ts - lastTs) / 1000 || 0, 0.05);
      lastTs = ts;
      t += dt * 0.4;
      const w = canvas.clientWidth, h = canvas.clientHeight;
      const centerX = w / 2, centerY = h / 2;
      ctx.clearRect(0, 0, w, h);

      bloom += (bloomTarget - bloom) * 0.06;
      const pulse = (Math.sin(t * 3) + 1) / 2;

      if (bloom > 0.02) {
        for (let r = 0; r < 7; r++) {
          const radius = (55 * r + (t * 45) % 55) * bloom;
          const alpha = Math.max(0, (1 - radius / (w * 0.4))) * bloom * (0.12 + pulse * 0.06);
          ctx.beginPath();
          ctx.strokeStyle = `rgba(197, 160, 89, ${alpha})`;
          ctx.lineWidth = 0.6 + (pulse * 1.2);
          ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      const threadCount = 12;
      const points = Math.max(80, Math.min(180, Math.round(w / 7)));
      for (let s = 0; s < threadCount; s++) {
        ctx.beginPath();
        const offset = (s / threadCount) * Math.PI * 2;
        ctx.strokeStyle = `rgba(197, 160, 89, ${0.3 * (1 - bloom)})`;
        ctx.lineWidth = 0.7;
        for (let i = 0; i <= points; i++) {
          const x = (i / points) * w;
          const xFactor = x * 0.01;
          const y1 = Math.sin(xFactor + t + offset) * 48;
          const y2 = Math.cos(xFactor * 0.5 - t * 0.5 + offset) * 15;
          const distToCenter = Math.abs(x - centerX);
          const disruption = Math.max(0, (250 - distToCenter));
          const jitter = Math.sin((x * 0.5) + (t * 12)) * (pulse * 14 * bloom * (disruption / 250));
          const y = centerY + (y1 + y2) * (1 - bloom) + jitter;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      // --- Constellation of link nodes (responsive layout, eased for smoothness) ---
      const narrow = w < 620;
      const cols = narrow ? 2 : 4;
      const rows = Math.ceil(nodeData.length / cols);
      const nodeSize = narrow ? 30 : 38;
      const spreadY = Math.min(1, (h * 0.42) / Math.max(1, (rows - 1) / 2 * (h / (rows + 1))));

      currentNodes = [];
      let anyHovered = false;

      nodeData.forEach((data, index) => {
        const row = Math.floor(index / cols);
        const col = index % cols;
        const targetX = (w / (cols + 1)) * (col + 1);
        const ny = (row + 1) / (rows + 1);
        const spreadTargetY = centerY + (ny * h - centerY) * spreadY;
        const baseTargetY = centerY + (spreadTargetY - centerY) * bloom;

        // Ease current position toward target → node positions glide when the
        // layout changes (e.g. 4-col ↔ 2-col as the window resizes).
        if (data.cx === undefined) { data.cx = targetX; data.cyBase = baseTargetY; }
        data.cx += (targetX - data.cx) * 0.14;
        data.cyBase += (baseTargetY - data.cyBase) * 0.14;

        const x = data.cx;
        const y = data.cyBase + Math.sin(t * 0.7 + col) * 6 * bloom;
        const size = nodeSize * bloom;

        const dist = Math.hypot(mouseX - x, mouseY - y);
        const isHovered = !isTouch && pointerInside && dist < size * 1.3;
        data.hoverState += (isHovered ? 1 - data.hoverState : -data.hoverState) * 0.08;

        drawVesicaIcon(x, y, size, bloom, data.hoverState);
        currentNodes.push({ x, y, r: Math.max(size * 1.3, 26), label: data.label, link: data.link, hover: data.hoverState });
        if (isHovered) anyHovered = true;
      });

      canvas.style.cursor = anyHovered ? 'pointer' : 'default';

      const labelFont = narrow ? "300 10px 'Crimson Pro'" : "300 11px 'Crimson Pro'";
      currentNodes.forEach(n => {
        const strength = isTouch ? bloom : n.hover;
        if (strength > 0.05) {
          ctx.save();
          ctx.font = labelFont;
          ctx.textAlign = "center";
          ctx.letterSpacing = (narrow ? 0.12 : (0.3 + n.hover * 0.2)) + "em";
          const wobble = isTouch ? 0 : (n.hover * 4 + Math.sin(t * 5) * n.hover);
          const yOffset = (narrow ? 40 : 50) + wobble;
          ctx.fillStyle = `rgba(226, 232, 240, ${strength * 0.9})`;
          ctx.fillText(n.label.toUpperCase(), n.x, n.y + yOffset);
          ctx.restore();
        }
      });

      // Motto (auto-fit) + tap hint placed well below the loom
      drawMotto(bloom > 0.8 ? "SYSTEMA STABILITUM // ARCHIVUM" : "OBSERVARE ET COLLIGERE",
                (w < 620 ? 26 : 30), w);

      if (isTouch && bloom < 0.25) {
        ctx.font = "300 10px 'Crimson Pro'";
        ctx.textAlign = "center";
        ctx.letterSpacing = "0.35em";
        ctx.fillStyle = `rgba(197, 160, 89, ${0.35 + pulse * 0.3})`;
        ctx.fillText("TAP TO EXPLORE", centerX, centerY + Math.min(135, h * 0.3));
      }

      if (!reduceMotion) requestAnimationFrame(loop);
    }

    sizeCanvas();
    requestAnimationFrame(() => { sizeCanvas(); });

    if (reduceMotion) {
      bloom = 1; bloomTarget = 1;
      loop(0);
    } else {
      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
