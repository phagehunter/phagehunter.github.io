<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CURTIS HOFFMANN</title>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200;0,400;1,200&family=Inter:wght@300&display=swap" rel="stylesheet">
  <style>
    :root {
      --midnight: #000b18;
      --indigo: #1a2a44;
      --gold: #c5a059;
      --bone: #e2e8f0;
      --slate: #4a5568;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Crimson Pro', serif;
      background-color: var(--midnight);
      background: radial-gradient(circle at center, var(--indigo) 0%, var(--midnight) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: var(--bone);
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0.04;
      pointer-events: none;
      background-image: repeating-linear-gradient(45deg, #fff 0px, #fff 1px, transparent 1px, transparent 3px);
    }

    .container { text-align: center; position: relative; z-index: 10; width: 100%; }

    header {
      margin-bottom: 2rem;
      animation: blurFadeIn 3.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .prefix {
      font-size: 0.65rem;
      letter-spacing: 0.8em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      font-weight: 300;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 200;
      letter-spacing: 0.3em;
      color: var(--bone);
      text-transform: uppercase;
    }

    .tagline {
      font-size: 0.85rem;
      font-style: italic;
      letter-spacing: 0.2em;
      color: var(--slate);
      margin-top: 0.8rem;
    }

    .canvas-container {
      position: relative;
      width: 100vw;
      height: 460px;
      margin: 0 auto;
    }

    canvas { display: block; filter: drop-shadow(0 0 20px rgba(197, 160, 89, 0.15)); }

    footer {
      position: relative;
      z-index: 20;
      margin-top: 2rem;
      animation: blurFadeIn 4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .cv-button {
      display: inline-block;
      padding: 0.8rem 2.5rem;
      border: 1px solid rgba(197, 160, 89, 0.3);
      color: var(--gold);
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      transition: all 0.5s ease;
      background: transparent;
    }

    .cv-button:hover {
      border-color: var(--gold);
      background: rgba(197, 160, 89, 0.05);
      letter-spacing: 0.5em;
      color: var(--bone);
    }

    #audio-toggle {
      position: fixed;
      bottom: 25px;
      left: 25px;
      z-index: 100;
      background: transparent;
      border: 1px solid rgba(74, 85, 104, 0.3);
      padding: 6px 12px;
      color: var(--slate);
      font-family: 'Crimson Pro', serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.4s ease;
      opacity: 0.7;
    }

    #audio-toggle:hover {
      color: var(--gold);
      border-color: var(--gold);
      opacity: 1;
    }

    @keyframes blurFadeIn {
      0% { opacity: 0; filter: blur(15px); transform: translateY(15px); letter-spacing: 1.5em; }
      100% { opacity: 1; filter: blur(0px); transform: translateY(0); }
    }
  </style>
</head>
<body>

  <audio id="bgMusic" loop>
    <source src="symphony.mp3" type="audio/mpeg">
  </audio>

  <button id="audio-toggle">Sound: Off</button>

  <div class="container">
    <header>
      <div class="prefix">Tikkun Mada</div>
      <h1>CURTIS HOFFMANN</h1>
      <div class="tagline">weaving biological and cultural lineages</div>
    </header>
    <div class="canvas-container">
      <canvas id="kineticLoom"></canvas>
    </div>
    <footer>
      <a href="https://docs.google.com/document/d/1HQFREZZm8r_EJMEj9ELAulepvqKbjB1_POZPjLV6dxM/edit?usp=sharing" target="_blank" class="cv-button">Curriculum Vitae</a>
    </footer>
  </div>

  <script>
    const canvas = document.getElementById('kineticLoom');
    const ctx = canvas.getContext('2d');
    const music = document.getElementById('bgMusic');
    const audioBtn = document.getElementById('audio-toggle');
    
    let t = 0, lastTs = 0, mouseX = -1, mouseY = -1, pointerInside = false;
    let bloom = 0;
    let musicInitialized = false;

    // --- Audio Toggle Logic ---
    audioBtn.addEventListener('click', (e) => {
      e.stopPropagation(); 
      
      if (!musicInitialized) {
        // First time initialization with fade-in
        music.volume = 0;
        music.play().then(() => {
          musicInitialized = true;
          audioBtn.innerText = "Sound: On";
          let fadeInterval = setInterval(() => {
            if (music.volume < 0.4) {
              music.volume += 0.02;
            } else {
              clearInterval(fadeInterval);
            }
          }, 150);
        }).catch(err => console.log("Audio playback blocked."));
      } else {
        // Subsequent toggles
        if (music.paused) {
          music.play();
          audioBtn.innerText = "Sound: On";
        } else {
          music.pause();
          audioBtn.innerText = "Sound: Off";
        }
      }
    });

    const nodeData = [
      { label: "Exoplanet Atlas", link: "https://phagehunter.github.io/exoplanetatlas/", hoverState: 0 },
      { label: "Planet Tracker", link: "https://phagehunter.github.io/terramotus/", hoverState: 0 },
      { label: "Biodefense Budget", link: "https://phagehunter.github.io/biodefense", hoverState: 0 },
      { label: "LinkedIn", link: "https://www.linkedin.com/in/phagehunter/", hoverState: 0 },
      { label: "Google Scholar", link: "https://scholar.google.com/citations?user=EOEi56EAAAAJ&hl=en", hoverState: 0 },
      { label: "Archive Beta", link: "#", hoverState: 0 },
      { label: "Archive Gamma", link: "#", hoverState: 0 },
      { label: "Archive Delta", link: "#", hoverState: 0 }
    ];

    let currentNodes = [];

    function sizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = canvas.parentElement.clientWidth * dpr;
      canvas.height = canvas.parentElement.clientHeight * dpr;
      canvas.style.width = canvas.parentElement.clientWidth + 'px';
      canvas.style.height = canvas.parentElement.clientHeight + 'px';
      ctx.scale(dpr, dpr);
    }
    window.addEventListener('resize', sizeCanvas);
    sizeCanvas();

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
      pointerInside = true;
    });
    
    canvas.addEventListener('mouseleave', () => { 
      pointerInside = false; 
      canvas.style.cursor = 'default'; 
    });
    
    canvas.addEventListener('click', () => {
      if (bloom > 0.6) {
        currentNodes.forEach(n => {
          const dx = mouseX - n.x, dy = mouseY - n.y;
          if (Math.sqrt(dx*dx + dy*dy) < n.r && n.link !== "#") window.open(n.link, '_blank');
        });
      }
    });

    function drawVesicaIcon(x, y, size, active, hoverState) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(t * 0.15);
      const scaleBoost = 1 + (hoverState * 0.2);
      const finalOpacity = (active * 0.5) + (hoverState * 0.5);
      ctx.lineWidth = 0.8 + (hoverState * 0.6);
      ctx.strokeStyle = `rgba(197, 160, 89, ${finalOpacity})`;
      if (hoverState > 0.01) {
        ctx.shadowBlur = hoverState * 20;
        ctx.shadowColor = `rgba(197, 160, 89, ${hoverState * 0.8})`;
      }
      const count = 6;
      for (let i = 0; i < count; i++) {
        ctx.rotate((Math.PI * 2) / count);
        ctx.beginPath();
        ctx.arc((size * scaleBoost) / 2.5, 0, (size * scaleBoost) / 1.8, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.fillStyle = `rgba(226, 232, 240, ${active})`;
      ctx.beginPath();
      ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function loop(ts) {
      const dt = (ts - lastTs) / 1000 || 0;
      lastTs = ts;
      t += dt * 0.4;
      const w = canvas.clientWidth, h = canvas.clientHeight;
      const centerX = w / 2, centerY = h / 2;
      ctx.clearRect(0, 0, w, h);

      bloom += ((pointerInside ? 1 : 0) - bloom) * 0.04;
      const pulse = (Math.sin(t * 3) + 1) / 2;

      if (bloom > 0.02) {
        for (let r = 0; r < 7; r++) {
          const radius = (55 * r + (t * 45) % 55) * bloom;
          const alpha = Math.max(0, (1 - radius / (w * 0.4))) * bloom * (0.12 + pulse * 0.06);
          ctx.beginPath();
          ctx.strokeStyle = `rgba(197, 160, 89, ${alpha})`;
          ctx.lineWidth = 0.6 + (pulse * 1.2);
          ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      const threadCount = 12;
      const points = 180;
      for (let s = 0; s < threadCount; s++) {
        ctx.beginPath();
        const offset = (s / threadCount) * Math.PI * 2;
        ctx.strokeStyle = `rgba(197, 160, 89, ${0.3 * (1 - bloom)})`;
        ctx.lineWidth = 0.7;
        for (let i = 0; i <= points; i++) {
          const x = (i / points) * w;
          const xFactor = x * 0.01;
          const y1 = Math.sin(xFactor + t + offset) * 48;
          const y2 = Math.cos(xFactor * 0.5 - t * 0.5 + offset) * 15;
          const distToCenter = Math.abs(x - centerX);
          const disruption = Math.max(0, (250 - distToCenter));
          const jitter = Math.sin((x * 0.5) + (t * 12)) * (pulse * 14 * bloom * (disruption / 250));
          const y = centerY + (y1 + y2) * (1 - bloom) + jitter;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      currentNodes = [];
      let anyHovered = false;
      const rows = 2, cols = 4;

      nodeData.forEach((data, index) => {
        const row = Math.floor(index / cols);
        const col = index % cols;
        const x = (w / (cols + 1)) * (col + 1);
        const y = centerY + (row === 0 ? -130 : 130) * bloom + Math.sin(t * 0.7 + col) * 6;
        const size = 38 * bloom;

        const dist = Math.sqrt((mouseX - x)**2 + (mouseY - y)**2);
        const isCurrentlyHovered = pointerInside && dist < size * 1.3;
        data.hoverState += (isCurrentlyHovered ? 1 - data.hoverState : -data.hoverState) * 0.04;

        drawVesicaIcon(x, y, size, bloom, data.hoverState);
        currentNodes.push({ x, y, r: size * 1.3, label: data.label, link: data.link, hover: data.hoverState });
        if (isCurrentlyHovered) anyHovered = true;
      });

      canvas.style.cursor = anyHovered ? 'pointer' : 'default';

      currentNodes.forEach(n => {
        if (n.hover > 0.01) {
          ctx.save();
          ctx.font = "300 11px 'Crimson Pro'";
          ctx.textAlign = "center";
          ctx.letterSpacing = (0.3 + n.hover * 0.2) + "em";
          const labelPadding = 50; 
          const yOffset = labelPadding + (n.hover * 4) + (Math.sin(t*5)*n.hover);
          ctx.fillStyle = `rgba(226, 232, 240, ${n.hover * 0.9})`;
          ctx.fillText(n.label.toUpperCase(), n.x, n.y + yOffset);
          ctx.restore();
        }
      });

      ctx.font = "400 9px 'Crimson Pro'";
      ctx.textAlign = "center";
      ctx.letterSpacing = "0.9em";
      ctx.fillStyle = `rgba(226, 232, 240, ${0.1 + bloom * 0.5})`;
      ctx.fillText(bloom > 0.8 ? "SYSTEMA STABILITUM // ARCHIVUM" : "OBSERVARE ET COLLIGERE", w/2, 40);

      requestAnimationFrame(loop);
    }
    
    requestAnimationFrame(loop);
  </script>
</body>
</html>
